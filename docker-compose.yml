services:
  backend:
    build:
      context: ./symfony-backend
      dockerfile: ./docker/php/Dockerfile
    container_name: symfony_backend

    entrypoint: ["docker-entrypoint.sh"]
    restart: unless-stopped
    working_dir: /var/www/app
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://symfony:password@db:5432/symfony_db?serverVersion=17&charset=utf8"
      JWT_PASSPHRASE: "83f2fbac3a7919bec1a322d5ffa115ac53af17af60bd2b948b98245ce33eca33"
    volumes:
      - ./symfony-backend:/var/www/app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["symfony", "server:start", "--no-tls", "--allow-http", "--port=8000", "--allow-all-ip"]


  db:
    image: postgres:17
    container_name: symfony_postgres
    restart: always
    environment:
      POSTGRES_USER: symfony
      POSTGRES_PASSWORD: password
      POSTGRES_DB: symfony_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U symfony -d symfony_db"]
      interval: 10s
      retries: 5

  frontend:
    build:
      context: ./angular-frontend
      dockerfile: Dockerfile
    container_name: angular_frontend
    restart: always
    working_dir: /app
    volumes:
      - ./angular-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    ports:
      - "4200:4200"
    command: ["sh", "-c", "npm install && ng serve --host 0.0.0.0"]


volumes:
  pgdata:
