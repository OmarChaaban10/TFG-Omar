<div class="login-scene min-h-screen text-slate-100">

  <!-- Main -->
  <main class="mx-auto flex max-w-6xl items-center justify-center px-4 py-10 sm:px-6" style="min-height: calc(100vh - 86px)">
    <section class="w-full max-w-md rounded-3xl border border-slate-700/80 bg-slate-900/70 p-6 backdrop-blur-sm sm:p-8" style="box-shadow: 0 20px 80px -35px rgba(249,115,22,0.45)">

      <!-- Logo -->
      <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-linear-to-br from-amber-500 to-orange-600 text-lg font-bold text-white" style="box-shadow: 0 10px 24px rgba(234,88,12,0.4)">
        TH
      </div>

      <h1 class="mt-5 text-center text-3xl font-bold tracking-tight text-slate-100">TaskHive</h1>
      <p class="mt-1 text-center text-sm text-slate-400">Inicia sesión en tu espacio de trabajo</p>

      <!-- Form -->
      <form class="mt-7 space-y-4" (submit)="login(); $event.preventDefault();" novalidate>

        <div class="flex flex-col gap-1.5">
          <label for="email" class="text-xs font-semibold tracking-wide text-slate-300">Correo electrónico</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="user@taskhive.app"
            class="w-full rounded-xl border border-orange-500/80 bg-slate-800/90 px-4 py-3 text-sm text-slate-100 outline-none transition placeholder:text-slate-500 focus:border-orange-400 focus:ring-2 focus:ring-orange-500/30"
            (input)="email = $any($event.target).value"
            [value]="email"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="password" class="text-xs font-semibold tracking-wide text-slate-300">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="********"
            class="w-full rounded-xl border border-slate-700 bg-slate-800/90 px-4 py-3 text-sm text-slate-100 outline-none transition placeholder:text-slate-500 focus:border-orange-400 focus:ring-2 focus:ring-orange-500/30"
            (input)="password = $any($event.target).value"
            [value]="password"
          />
        </div>

        <div class="flex items-center justify-between gap-3 text-xs">
          <label class="flex cursor-pointer items-center gap-2 text-slate-400">
            <input
              type="checkbox"
              class="h-4 w-4 accent-orange-500"
              (change)="rememberMe = $any($event.target).checked"
              [checked]="rememberMe"
            />
            Recordarme
          </label>
          <a routerLink="/forgot-password" class="font-semibold text-orange-400 transition-colors hover:text-orange-300">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        <div *ngIf="errorMessage" class="rounded-2xl border border-red-500/60 bg-red-500/10 px-4 py-3 text-sm text-red-200">
          {{ errorMessage }}
        </div>

        <button
          type="submit"
          [disabled]="isSubmitting"
          class="w-full cursor-pointer rounded-xl bg-linear-to-r from-orange-500 to-amber-500 px-4 py-3 text-sm font-bold text-slate-950 transition hover:brightness-110 disabled:cursor-not-allowed disabled:opacity-70 flex items-center justify-center gap-2"
        >
          <span *ngIf="isSubmitting" class="animate-spin rounded-full h-4 w-4 border-2 border-slate-950 border-t-transparent"></span>
          <span *ngIf="isSubmitting">Iniciando sesión...</span>
          <span *ngIf="!isSubmitting">Iniciar sesión</span>
        </button>

      </form>

      <!-- Division -->
      <div class="my-5 flex items-center gap-3 text-xs text-slate-500">
        <span class="h-px flex-1 bg-slate-700"></span>
        o
        <span class="h-px flex-1 bg-slate-700"></span>
      </div>

      <p class="text-center text-sm text-slate-400">
        ¿No tienes cuenta?
        <a routerLink="/register" class="ml-1 font-semibold text-orange-400 transition-colors hover:text-orange-300">Crear cuenta -></a>
      </p>

    </section>
  </main>

</div>
