<div class="login-scene min-h-screen text-slate-100">

  <!-- Main -->
  <main class="mx-auto flex max-w-6xl items-center justify-center px-4 py-10 sm:px-6" style="min-height: calc(100vh - 86px)">
    <section class="w-full max-w-md rounded-3xl border border-slate-700/80 bg-slate-900/70 p-6 backdrop-blur-sm sm:p-8" style="box-shadow: 0 20px 80px -35px rgba(249,115,22,0.45)">

      <!-- Logo -->
      <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-linear-to-br from-amber-500 to-orange-600 text-lg font-bold text-white" style="box-shadow: 0 10px 24px rgba(234,88,12,0.4)">
        TH
      </div>

      <h1 class="mt-5 text-center text-3xl font-bold tracking-tight text-slate-100">TaskHive</h1>
      <p class="mt-1 text-center text-sm text-slate-400">Inicia sesión en tu espacio de trabajo</p>

      <!-- Form -->
      <form class="mt-7 space-y-4" [formGroup]="loginForm" (submit)="login(); $event.preventDefault();" novalidate>

        <div class="flex flex-col gap-1.5">
          <label for="email" class="text-xs font-semibold tracking-wide text-slate-300">Correo electrónico</label>
          <input
            id="email"
            formControlName="email"
            type="email"
            placeholder="user@taskhive.app"
            class="w-full rounded-xl border border-orange-500/80 bg-slate-800/90 px-4 py-3 text-sm text-slate-100 outline-none transition placeholder:text-slate-500 focus:border-orange-400 focus:ring-2 focus:ring-orange-500/30"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="password" class="text-xs font-semibold tracking-wide text-slate-300">Contraseña</label>
          <div class="relative">
            <input
              id="password"
              formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="********"
              class="w-full rounded-xl border border-slate-700 bg-slate-800/90 px-4 py-3 pr-12 text-sm text-slate-100 outline-none transition placeholder:text-slate-500 focus:border-orange-400 focus:ring-2 focus:ring-orange-500/30"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-orange-400 transition-colors cursor-pointer focus:outline-none"
              [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              @if (!showPassword) {
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              }
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between gap-3 text-xs">
          <label class="flex cursor-pointer items-center gap-2 text-slate-400">
            <input
              type="checkbox"
              formControlName="rememberMe"
              class="h-4 w-4 accent-orange-500 cursor-pointer"
            />
            Recordarme
          </label>
          <a routerLink="/forgot-password" class="font-semibold text-orange-400 transition-colors hover:text-orange-300">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        @if (errorMessage) {
          <div class="rounded-2xl border border-red-500/60 bg-red-500/10 px-4 py-3 text-sm text-red-200">
            {{ errorMessage }}
          </div>
        }

        <button
          type="submit"
          [disabled]="isSubmitting"
          class="w-full cursor-pointer rounded-xl bg-linear-to-r from-orange-500 to-amber-500 px-4 py-3 text-sm font-bold text-slate-950 transition hover:brightness-110 disabled:cursor-not-allowed disabled:opacity-70 flex items-center justify-center gap-2"
        >
          @if (isSubmitting) {
            <span class="animate-spin rounded-full h-4 w-4 border-2 border-slate-950 border-t-transparent"></span>
            <span>Iniciando sesión...</span>
          } @else {
            <span>Iniciar sesión</span>
          }
        </button>

      </form>

      <!-- Division -->
      <div class="my-5 flex items-center gap-3 text-xs text-slate-500">
        <span class="h-px flex-1 bg-slate-700"></span>
        o
        <span class="h-px flex-1 bg-slate-700"></span>
      </div>

      <p class="text-center text-sm text-slate-400">
        ¿No tienes cuenta?
        <a routerLink="/register" class="ml-1 font-semibold text-orange-400 transition-colors hover:text-orange-300">Crear cuenta -></a>
      </p>

    </section>
  </main>

</div>
