<div class="login-scene min-h-screen" style="color: var(--text-primary)">

  <!-- Theme toggle -->
  <div class="fixed top-4 right-4 z-50">
    <app-theme-toggle></app-theme-toggle>
  </div>

  <!-- Principal -->
  <main class="mx-auto flex max-w-6xl items-center justify-center px-4 py-10 sm:px-6" style="min-height: calc(100vh - 86px)">
    <section class="login-card w-full max-w-md rounded-3xl border p-6 backdrop-blur-sm sm:p-8">

      <!-- Logo -->
      <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-linear-to-br from-amber-500 to-orange-600 text-lg font-bold text-white" style="box-shadow: 0 10px 24px rgba(234,88,12,0.4)">
        TH
      </div>

      <h1 class="mt-5 text-center text-3xl font-bold tracking-tight login-title">Recuperar contraseña</h1>
      <p class="mt-1 text-center text-sm login-subtitle">Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>

      <!-- Formulario -->
      <form class="mt-7 space-y-4" (ngSubmit)="onSubmit()" novalidate>

        <div class="flex flex-col gap-1.5">
          <label for="email" class="text-xs font-semibold tracking-wide login-label">Correo electrónico</label>
          <input
            id="email"
            name="email"
            type="email"
            [(ngModel)]="email"
            placeholder="user@taskhive.app"
            class="login-input w-full rounded-xl border border-orange-500/80 px-4 py-3 text-sm outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-500/30"
          />
        </div>

        @if (errorMessage) {
          <div class="text-sm font-medium text-red-500">{{ errorMessage }}</div>
        }
        @if (successMessage) {
          <div class="text-sm font-medium text-green-500">{{ successMessage }}</div>
        }

        <button
          type="submit"
          [disabled]="loading"
          class="w-full cursor-pointer rounded-xl bg-linear-to-r from-orange-500 to-amber-500 px-4 py-3 text-sm font-bold text-slate-950 transition hover:brightness-110 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          @if (loading) {
            <span class="h-4 w-4 animate-spin rounded-full border-2 border-slate-900 border-t-transparent"></span>
          }
          Enviar enlace
        </button>

      </form>

      <div class="mt-5 text-center text-sm text-slate-400">
        <a routerLink="/" class="font-semibold text-orange-400 transition-colors hover:text-orange-300">Volver al inicio</a>
      </div>

    </section>
  </main>

</div>
