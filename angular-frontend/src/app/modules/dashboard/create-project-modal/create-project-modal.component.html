<div class="fixed inset-0 z-50 flex items-center justify-center">
  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" (click)="close()"></div>

  <!-- Panel -->
  <div class="relative w-full max-w-lg mx-4 th-modal border border-slate-700 rounded-xl shadow-2xl shadow-black/50">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-700">
      <h2 class="text-lg font-bold text-white">Nuevo proyecto</h2>
      <button (click)="close()" class="text-slate-400 hover:text-white transition cursor-pointer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="px-6 py-5 space-y-5">
      <!-- Error -->
      @if (createError) {
      <div
        class="flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-400 rounded-lg px-3 py-2 text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        {{ createError }}
      </div>
      }

      <!-- Nombre -->
      <div>
        <label for="project-name" class="block text-sm font-medium text-slate-300 mb-1.5">Nombre *</label>
        <input id="project-name" type="text" [(ngModel)]="newProjectName" maxlength="255"
          placeholder="Mi nuevo proyecto"
          class="w-full th-input border rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition" />
      </div>

      <!-- Descripcion -->
      <div>
        <label for="project-desc" class="block text-sm font-medium text-slate-300 mb-1.5">Descripcion</label>
        <textarea id="project-desc" [(ngModel)]="newProjectDescription" rows="3"
          placeholder="Describe brevemente el proyecto..."
          class="w-full th-input border rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition resize-none"></textarea>
      </div>

      <!-- Color -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Color del proyecto</label>
        <div class="flex flex-wrap gap-2">
          @for (color of colorPresets; track color) {
          <button type="button" (click)="selectColor(color)"
            class="w-8 h-8 rounded-full border-2 transition cursor-pointer" [style.backgroundColor]="color"
            [class.border-white]="newProjectColor === color" [class.border-transparent]="newProjectColor !== color"
            [class.scale-110]="newProjectColor === color">
          </button>
          }
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-700">
      <button (click)="close()"
        class="px-4 py-2 text-sm font-medium text-slate-400 hover:text-white transition cursor-pointer">
        Cancelar
      </button>
      <button (click)="createProject()" [disabled]="isCreating"
        class="px-5 py-2 text-sm font-bold text-white bg-orange-500 hover:bg-orange-600 rounded-lg transition shadow-lg shadow-orange-500/20 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
        @if (isCreating) {
        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        Creando...
        } @else {
        Crear proyecto
        }
      </button>
    </div>
  </div>
</div>
